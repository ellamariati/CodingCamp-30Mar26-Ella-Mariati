<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="grain"></div>

  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Expense<em>Vis</em></span>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
        <span class="toggle-icon">☽</span>
      </button>
    </div>
  </header>

  <main class="app-main">

    <!-- Balance Card -->
    <section class="balance-card" id="balanceCard">
      <div class="balance-label">TOTAL BALANCE</div>
      <div class="balance-amount" id="totalBalance">Rp 0</div>
      <div class="balance-sub" id="balanceSub">0 transaksi tercatat</div>
      <div class="balance-blob"></div>
    </section>

    <!-- Input Form -->
    <section class="card form-card">
      <h2 class="card-title">Tambah Transaksi</h2>
      <div class="form-grid">
        <div class="field">
          <label for="itemName">Nama Item</label>
          <input type="text" id="itemName" placeholder="Contoh: Makan siang..." autocomplete="off" />
        </div>
        <div class="field">
          <label for="itemAmount">Jumlah (Rp)</label>
          <input type="number" id="itemAmount" placeholder="0" min="0" />
        </div>
        <div class="field full">
          <label for="itemCategory">Kategori</label>
          <div class="select-wrapper">
            <select id="itemCategory">
              <option value="">-- Pilih Kategori --</option>
              <option value="Food">🍜 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Fun">🎮 Fun</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Health">💊 Health</option>
              <option value="Custom">✏️ Custom</option>
            </select>
            <span class="select-arrow">▾</span>
          </div>
        </div>
        <div class="field full" id="customCatField" style="display:none;">
          <label for="customCat">Nama Kategori Kustom</label>
          <input type="text" id="customCat" placeholder="Masukkan kategori..." />
        </div>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <button class="btn-add" id="addBtn">
        <span>+ Tambah Transaksi</span>
      </button>
    </section>

    <!-- Monthly Summary Toggle -->
    <div class="toggle-row">
      <button class="tab-btn active" id="tabList" onclick="switchTab('list')">Transaksi</button>
      <button class="tab-btn" id="tabSummary" onclick="switchTab('summary')">Ringkasan Bulanan</button>
    </div>

    <div class="two-col">

      <!-- Transaction List -->
      <section class="card list-card" id="panelList">
        <div class="list-header">
          <h2 class="card-title">Transaksi</h2>
          <div class="sort-row">
            <label>Urutkan:</label>
            <select id="sortSelect" onchange="renderList()">
              <option value="newest">Terbaru</option>
              <option value="amount-desc">Jumlah ↓</option>
              <option value="amount-asc">Jumlah ↑</option>
              <option value="category">Kategori</option>
            </select>
          </div>
        </div>
        <div class="transaction-list" id="transactionList">
          <div class="empty-state">
            <span class="empty-icon">📭</span>
            <p>Belum ada transaksi</p>
          </div>
        </div>
      </section>

      <!-- Monthly Summary -->
      <section class="card list-card" id="panelSummary" style="display:none;">
        <h2 class="card-title">Ringkasan Bulan Ini</h2>
        <div id="monthlySummary" class="monthly-summary"></div>
      </section>

      <!-- Chart -->
      <section class="card chart-card">
        <h2 class="card-title">Pengeluaran per Kategori</h2>
        <div class="chart-wrapper">
          <canvas id="spendingChart"></canvas>
          <div class="chart-empty" id="chartEmpty">
            <span>Belum ada data</span>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Limit Warning Banner -->
  <div class="limit-banner" id="limitBanner">
    ⚠️ Pengeluaran kamu melebihi <strong id="limitDisplay">Rp 0</strong>!
    <button onclick="dismissBanner()">✕</button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
